<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Halaman Pendaftaran Pengguna Baharu">
  <title>Sign Up - Login</title>
 
</head>
<body>

  <main>
    <header>
      <h1>Registration</h1>
    </header>

    <section>
      <!-- Bahagian atas: Logo + Nama -->
      <div class="top-row">
        <figure aria-label="Gambar Profil"></figure>

        <fieldset>
          <legend></legend>
          <div>
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
          </div>
          <div>
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
          </div>
        </fieldset>
      </div>

      <!-- Baki maklumat -->
      <fieldset class="extra">
        <legend></legend>
        <div>
          <label for="phone">Number Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Number Phone" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required minlength="6">
        </div>
      </fieldset>
    </section>

    <footer>
      <button type="submit">Register</button>
      <p>Sudah ada akaun? <a href="User Login.html">Login di sini</a></p>
    </footer>
  </main>

</body>
</html>
