<html>
<head>
    <title> Pet Community</title>
    <link rel="stylesheet" href="community.css">
</head>
<body>
    <!-- Header -->
    <div class ="header">
        <div class=" logo"> Furever Pet Home</div>
        <div class="profile"></div>
    </div>

    <!-- Navigation -->
    <div class="navigation">
        <a href="#">DASHBOARD</a>
        <a href="#">USERS/NGOS</a>
        <a href="#"> REPORTS</a>
        <a href="#">ANALYTICS</a>
        <a href="#" class="active">PET COMMUNITY</a>
        <a href="#">HELP CENTER</a>
    </div>

    <!-- Structure of the content section-->
    <div class= "wrapper">

        <div class="box" id="post-1">
            <img src = "dog.jpg" alt="dog" class="img">
            <div class="content">
                <h4> ABC</h4>
                <p>Event venue : Central Park</p>
            </div>
            <div class="actions">
                <span class="view" onclick="viewPost(1)">✏️</span>
                <span class="delete" onclick="deletePost(1)">🗑️</span>
            </div>
        </div>
  
        <div class="box" id="post-2">
            <img src = "cat.jpg" alt="cat" class="img">
            <div class="content">
                <h4> ABC</h4>
                <p>Date : 2026-05-05</p>
            </div>    
            <div class="actions">
                <span class="view" onclick="viewPost(2)">✏️</span>
                <span class="delete" onclick="deletePost(2)">🗑️</span>
            </div>
        </div>
    </div>

    <!---Popup Modal--->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Post Detail</h3>
                <span class="modal-close" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-body">
                <img id="modal-img" src="" alt="" class="modal-img">
                <div id="modal-content">
                </div>
            </div>
        </div>
    </div>

    <!--confirmation delete-->
    <div class="modal-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <p>Are you sure you want to delete this post?</p>
            <div class="confirm-buttons">
                <button class="confirm" onclick="confirmDelete()">Confirm</button>
                <button class="cancel" onclick="cancelDelete()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="community.js"></script>
</body>
</html>
